<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обговорення</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<main>
    <header class="header">
        <h1>Forum</h1>
        <button class="link" id="logout">Logout</button>
    </header>
    <h2>Список обговорень</h2>
    <ul id="discussionsList"></ul>

    <h2>Створити нове обговорення</h2>
    <form id="createDiscussionForm">
        <input type="text" id="title" placeholder="Заголовок" required>
        <textarea id="content" placeholder="Текст обговорення" required></textarea>
        <button type="submit">Створити обговорення</button>
    </form>
</main>
</body>
</html>
