<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обговорення</title>
    <link rel="stylesheet" href="styles.css"> <!-- Підключаємо CSS -->
</head>
<body>

    <h1>Обговорення</h1>

    <!-- Форма для створення нового обговорення -->
    <h2>Створити нове обговорення</h2>
    <form id="createDiscussionForm">
        <input type="text" id="title" placeholder="Заголовок" required>
        <textarea id="content" placeholder="Текст обговорення" required></textarea>
        <button type="submit">Створити обговорення</button>
    </form>

    <!-- Список обговорень -->
    <h2>Список обговорень</h2>
    <ul id="discussionsList"></ul>

    <script src="app.js"></script> <!-- Підключаємо JavaScript -->
</body>
</html>
